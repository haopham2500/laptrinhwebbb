<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lập trình web - Đăng ký</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <nav>
            <a href="index.html">Home</a> | 
            <a href="login.html">Đăng nhập</a> | 
            <a href="register.html" class="active">Đăng ký</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="form-container register-box">
            <h2>Màn hình đăng ký</h2>
            
            <form action="process_register.php" method="POST">
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="input-group">
                    <label for="re-password">Nhập lại mật khẩu</label>
                    <input type="password" id="re-password" name="re-password" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="actions-group">
                    <a href="login.html" class="alt-link">Đã có tài khoản</a>
                    <button type="submit" class="btn-submit">Đăng ký</button>
                </div>

            </form>
        </div>
    </main>

    <footer class="main-footer">
        <p>Lập trình web @01/2024</p>
    </footer>

</body>
</html>
